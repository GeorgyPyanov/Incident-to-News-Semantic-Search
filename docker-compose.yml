services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: incident-news-postgres
    environment:
      POSTGRES_DB: incident_news_search
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d incident_news_search"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    container_name: incident-news-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/incident_news_search
      OLLAMA_BASE_URL: http://ollama:11434
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/home/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    container_name: incident-news-ollama
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  check:
    build:
      context: .
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/incident_news_search
    volumes:
      - hf_cache:/home/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "database.check", "--min-total", "50000"]

  embed:
    build:
      context: .
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/incident_news_search
    volumes:
      - hf_cache:/home/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "data.embed_raw_news", "--all"]

  validate_linked:
    build:
      context: .
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/incident_news_search
    volumes:
      - hf_cache:/home/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "evaluation.validate_retrieval", "--top-k", "10"]

  validate_qrels:
    build:
      context: .
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/incident_news_search
    volumes:
      - hf_cache:/home/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "evaluation.validate_qrels", "--top-k", "10"]

  embedding_analysis:
    build:
      context: .
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/incident_news_search
    volumes:
      - hf_cache:/home/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "evaluation.embedding_analysis", "--backend", "auto"]

  benchmark_real:
    build:
      context: .
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/incident_news_search
    volumes:
      - hf_cache:/home/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "python",
        "-m",
        "evaluation.benchmark_real",
        "--benchmark-document-embeddings",
        "--embedding-sample-size",
        "100",
      ]

  compare_iterations:
    build:
      context: .
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/incident_news_search
    volumes:
      - hf_cache:/home/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "python",
        "-m",
        "evaluation.compare_iterations",
        "--top-k",
        "10",
        "--embedding-sample-size",
        "100",
      ]

volumes:
  postgres_data:
  hf_cache:
  ollama_data:
