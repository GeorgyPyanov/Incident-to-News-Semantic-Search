services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: incident-news-postgres
    environment:
      POSTGRES_DB: incident_news_search
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d incident_news_search"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
